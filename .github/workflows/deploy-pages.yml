# Publishes dist/ in two ways (pick ONE in repo Settings → Pages):
# - Source: GitHub Actions → deploy job (artifact).
# - Source: Deploy from branch → Branch "gh-pages" / folder "/" → push-gh-pages job.
# If Source is "main" / root, GitHub serves dev index.html (/src/main.tsx) → blank page.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build:gh
      # GitHub Pages: upload-pages-artifact v4 + Artifact Actions v4 요구 (v3 단계적 폐기)
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
          include-hidden-files: true
      - uses: actions/upload-artifact@v4
        with:
          name: link-help-dist
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  # Lets Pages work when Settings → Pages uses branch "gh-pages" (not main root).
  # Does not fail the whole workflow if branch protection / token blocks this path
  # (primary deploy job uses actions/deploy-pages when Source = GitHub Actions).
  push-gh-pages:
    needs: build
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: link-help-dist
          path: dist
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
